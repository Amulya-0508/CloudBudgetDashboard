{% extends 'base.html' %}

{% block title %}Edit Expense - Cloud Budget Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-panel">
            <h2 class="mb-2 font-weight-bold text-gradient-cyan">Edit Expenditure</h2>
            <p class="text-muted mb-4">Modify the billing entry parameters below.</p>
            
            <form action="{{ url_for('edit_expense', cost_id=expense.cost_id) }}" method="POST" autocomplete="off">
                
                <div class="mb-3">
                    <label for="service_name" class="form-label text-muted small">Cloud Service</label>
                    <select class="form-select form-select-custom" id="service_name" name="service_name" required>
                        <option value="" disabled>Select Service...</option>
                        {% for svc in common_services %}
                            <option value="{{ svc }}" {% if expense.service_name == svc %}selected{% endif %}>{{ svc }}</option>
                        {% endfor %}
                        <option value="Other" {% if is_custom %}selected{% endif %}>Other (Specify below)...</option>
                    </select>
                </div>
                
                <!-- Custom Service Input -->
                <div class="mb-3" id="custom_service_wrapper" style="display: {% if is_custom %}block{% else %}none{% endif %};">
                    <label for="custom_service" class="form-label text-muted small">Custom Service Name</label>
                    <input type="text" class="form-control form-control-custom" id="custom_service" name="custom_service" 
                           value="{{ expense.service_name if is_custom else '' }}" placeholder="e.g. Route53, EKS, CosmosDB">
                </div>
                
                <div class="mb-3">
                    <label for="amount" class="form-label text-muted small">Amount (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-muted" style="border: 1px solid rgba(255,255,255,0.1); border-radius: 8px 0 0 8px;">
                            ₹
                        </span>
                        <input type="number" step="0.01" min="0.01" class="form-control form-control-custom" id="amount" name="amount" 
                               value="{{ expense.amount }}" placeholder="0.00" required style="border-radius: 0 8px 8px 0 !important;">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="usage_date" class="form-label text-muted small">Billing/Usage Date</label>
                    <input type="date" class="form-control form-control-custom" id="usage_date" name="usage_date" value="{{ expense.usage_date }}" required>
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-custom-primary flex-grow-1">
                        <i class="bi bi-save me-2"></i>Update Entry
                    </button>
                    <a href="{{ url_for('expenses') }}" class="btn btn-custom-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const serviceSelect = document.getElementById('service_name');
        const customWrapper = document.getElementById('custom_service_wrapper');
        const customInput = document.getElementById('custom_service');
        
        serviceSelect.addEventListener('change', function() {
            if (this.value === 'Other') {
                customWrapper.style.display = 'block';
                customInput.setAttribute('required', 'required');
                customInput.focus();
            } else {
                customWrapper.style.display = 'none';
                customInput.removeAttribute('required');
                customInput.value = '';
            }
        });
    });
</script>
{% endblock %}
